name: Build Extra Dim Tile APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Generate Android Project Structure
        run: |
          mkdir -p app/src/main/java/com/extradim/tile
          
          # Create settings.gradle
          cat << 'EOF' > settings.gradle
          pluginManagement {
              repositories {
                  google()
                  mavenCentral()
                  gradlePluginPortal()
              }
          }
          dependencyResolutionManagement {
              repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
              repositories {
                  google()
                  mavenCentral()
              }
          }
          rootProject.name = "ExtraDimTile"
          include ':app'
          EOF
          
          # Create build.gradle (Root)
          cat << 'EOF' > build.gradle
          buildscript {
              repositories {
                  google()
                  mavenCentral()
              }
              dependencies {
                  classpath "com.android.tools.build:gradle:8.2.2"
              }
          }
          EOF
          
          # Create app/build.gradle
          cat << 'EOF' > app/build.gradle
          plugins {
              id 'com.android.application'
          }
          android {
              namespace 'com.extradim.tile'
              compileSdk 34
              defaultConfig {
                  applicationId "com.extradim.tile"
                  minSdk 31
                  targetSdk 34
                  versionCode 1
                  versionName "1.0"
              }
              buildTypes {
                  debug {
                      minifyEnabled false
                  }
              }
          }
          EOF
          
          # Create AndroidManifest.xml (Headless App)
          cat << 'EOF' > app/src/main/AndroidManifest.xml
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <!-- Request the permission to modify database values natively -->
              <uses-permission android:name="android.permission.WRITE_SECURE_SETTINGS" />
              
              <application
                  android:allowBackup="false"
                  android:label="Extra Dim"
                  android:icon="@android:drawable/ic_menu_view">
                  
                  <service
                      android:name=".ExtraDimTileService"
                      android:label="Extra Dim"
                      android:icon="@android:drawable/ic_menu_view"
                      android:permission="android.permission.BIND_QUICK_SETTINGS_TILE"
                      android:exported="true">
                      <intent-filter>
                          <action android:name="android.service.quicksettings.action.QS_TILE" />
                      </intent-filter>
                  </service>
              </application>
          </manifest>
          EOF
          
          # Create Java Source Code with the Clickable Fix Pre-Baked
          cat << 'EOF' > app/src/main/java/com/extradim/tile/ExtraDimTileService.java
          package com.extradim.tile;
          
          import android.provider.Settings;
          import android.service.quicksettings.Tile;
          import android.service.quicksettings.TileService;
          import android.util.Log;
          
          public class ExtraDimTileService extends TileService {
              private static final String EXTRA_DIM_KEY = "reduce_bright_colors_activated";
              
              @Override
              public void onStartListening() {
                  super.onStartListening();
                  updateTileState();
              }
              
              @Override
              public void onClick() {
                  super.onClick();
                  try {
                      int currentState = 0;
                      try {
                          currentState = Settings.Secure.getInt(getContentResolver(), EXTRA_DIM_KEY, 0);
                      } catch (Exception e) {
                          Log.w("ExtraDimTile", "Could not read state, attempting write anyway");
                      }
                      
                      int newState = (currentState == 1) ? 0 : 1;
                      Settings.Secure.putInt(getContentResolver(), EXTRA_DIM_KEY, newState);
                      
                      Tile tile = getQsTile();
                      if (tile != null) {
                          tile.setState(newState == 1 ? Tile.STATE_ACTIVE : Tile.STATE_INACTIVE);
                          tile.updateTile();
                      }
                  } catch (Exception e) {
                      Log.e("ExtraDimTile", "Write failed. Ensure WRITE_SECURE_SETTINGS is granted.", e);
                  }
              }
              
              private void updateTileState() {
                  Tile tile = getQsTile();
                  if (tile != null) {
                      try {
                          int currentState = Settings.Secure.getInt(getContentResolver(), EXTRA_DIM_KEY, 0);
                          tile.setState(currentState == 1 ? Tile.STATE_ACTIVE : Tile.STATE_INACTIVE);
                      } catch (Exception e) {
                          // FORCE CLICKABLE: Keeps tile intact even if background checks are restricted initially
                          tile.setState(Tile.STATE_INACTIVE);
                      }
                      tile.updateTile();
                  }
              }
          }
          EOF

      - name: Build APK (Debug to auto-sign)
        run: gradle :app:assembleDebug

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ExtraDimTile-Ready-To-Install
          path: app/build/outputs/apk/debug/*.apk
