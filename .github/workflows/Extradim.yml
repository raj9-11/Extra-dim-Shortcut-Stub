name: Build Extra Dim Tile APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Generate Android Project Structure
        run: |
          mkdir -p app/src/main/java/com/extradim/tile
          
          # Create settings.gradle
          cat << 'EOF' > settings.gradle
          pluginManagement {
              repositories {
                  google()
                  mavenCentral()
                  gradlePluginPortal()
              }
          }
          dependencyResolutionManagement {
              repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
              repositories {
                  google()
                  mavenCentral()
              }
          }
          rootProject.name = "ExtraDimTile"
          include ':app'
          EOF
          
          # Create build.gradle (Root)
          cat << 'EOF' > build.gradle
          buildscript {
              repositories {
                  google()
                  mavenCentral()
              }
              dependencies {
                  classpath "com.android.tools.build:gradle:8.2.2"
              }
          }
          EOF
          
          # Create app/build.gradle
          cat << 'EOF' > app/build.gradle
          plugins {
              id 'com.android.application'
          }
          android {
              namespace 'com.extradim.tile'
              compileSdk 34
              defaultConfig {
                  applicationId "com.extradim.tile"
                  minSdk 31
                  targetSdk 34
                  versionCode 1
                  versionName "1.0"
              }
              buildTypes {
                  debug {
                      minifyEnabled false
                  }
              }
          }
          EOF
          
          # Create AndroidManifest.xml (TileService + Invisible Trampoline Activity)
          cat << 'EOF' > app/src/main/AndroidManifest.xml
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <!-- Request the permission to modify database values natively -->
              <uses-permission android:name="android.permission.WRITE_SECURE_SETTINGS" />
              
              <application
                  android:allowBackup="false"
                  android:label="Extra Dim"
                  android:icon="@android:drawable/ic_menu_view">
                  
                  <service
                      android:name=".ExtraDimTileService"
                      android:label="Extra Dim"
                      android:icon="@android:drawable/ic_menu_view"
                      android:permission="android.permission.BIND_QUICK_SETTINGS_TILE"
                      android:exported="true">
                      <intent-filter>
                          <action android:name="android.service.quicksettings.action.QS_TILE" />
                      </intent-filter>
                  </service>
                  
                  <!-- This intercepts the Long Press -->
                  <activity
                      android:name=".LongPressActivity"
                      android:theme="@android:style/Theme.Translucent.NoTitleBar"
                      android:excludeFromRecents="true"
                      android:exported="true">
                      <intent-filter>
                          <action android:name="android.service.quicksettings.action.QS_TILE_PREFERENCES" />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF
          
          # Create ExtraDimTileService.java (With Internal Memory State Tracking)
          cat << 'EOF' > app/src/main/java/com/extradim/tile/ExtraDimTileService.java
          package com.extradim.tile;
          
          import android.content.Context;
          import android.content.SharedPreferences;
          import android.provider.Settings;
          import android.service.quicksettings.Tile;
          import android.service.quicksettings.TileService;
          import android.util.Log;
          
          public class ExtraDimTileService extends TileService {
              private static final String EXTRA_DIM_KEY = "reduce_bright_colors_activated";
              private static final String PREFS_NAME = "ExtraDimPrefs";
              private static final String STATE_KEY = "is_active";
              
              private SharedPreferences getPrefs() {
                  return getSharedPreferences(PREFS_NAME, Context.MODE_PRIVATE);
              }
          
              @Override
              public void onStartListening() {
                  super.onStartListening();
                  Tile tile = getQsTile();
                  if (tile != null) {
                      boolean isActive = getPrefs().getBoolean(STATE_KEY, false);
                      tile.setState(isActive ? Tile.STATE_ACTIVE : Tile.STATE_INACTIVE);
                      tile.updateTile();
                  }
              }
              
              @Override
              public void onClick() {
                  super.onClick();
                  Tile tile = getQsTile();
                  if (tile != null) {
                      boolean currentState = getPrefs().getBoolean(STATE_KEY, false);
                      boolean newState = !currentState;
                      
                      try {
                          Settings.Secure.putInt(getContentResolver(), EXTRA_DIM_KEY, newState ? 1 : 0);
                          getPrefs().edit().putBoolean(STATE_KEY, newState).apply();
                          
                          tile.setState(newState ? Tile.STATE_ACTIVE : Tile.STATE_INACTIVE);
                          tile.updateTile();
                      } catch (Exception e) {
                          Log.e("ExtraDimTile", "Write failed. Verify WRITE_SECURE_SETTINGS via ADB.", e);
                      }
                  }
              }
          }
          EOF

          # Create LongPressActivity.java (Invisible Trampoline to System Settings)
          cat << 'EOF' > app/src/main/java/com/extradim/tile/LongPressActivity.java
          package com.extradim.tile;
          
          import android.app.Activity;
          import android.content.Intent;
          import android.os.Bundle;
          
          public class LongPressActivity extends Activity {
              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  try {
                      // Attempt to open the specific Extra Dim settings page directly
                      Intent intent = new Intent("android.settings.REDUCE_BRIGHT_COLORS_SETTINGS");
                      intent.setFlags(Intent.FLAG_ACTIVITY_NEW_TASK | Intent.FLAG_ACTIVITY_CLEAR_TASK);
                      startActivity(intent);
                  } catch (Exception e) {
                      // Fallback: Open general accessibility if ColorOS throws an exception
                      try {
                          Intent fallback = new Intent(android.provider.Settings.ACTION_ACCESSIBILITY_SETTINGS);
                          fallback.setFlags(Intent.FLAG_ACTIVITY_NEW_TASK | Intent.FLAG_ACTIVITY_CLEAR_TASK);
                          startActivity(fallback);
                      } catch (Exception ex) {
                          ex.printStackTrace();
                      }
                  }
                  finish(); // Instantly kill this invisible activity so the user never sees it
              }
          }
          EOF

      - name: Build APK (Debug to auto-sign)
        run: gradle :app:assembleDebug

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ExtraDimTile-Ready-To-Install
          path: app/build/outputs/apk/debug/*.apk
